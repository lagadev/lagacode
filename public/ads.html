<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Earn Rewards</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <!-- Ad Script -->
    <script src='//libtl.com/sdk.js' data-zone='10525553' data-sdk='show_10525553'></script>

    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            --card-bg: rgba(255, 255, 255, 0.05);
            --card-border: rgba(255, 255, 255, 0.1);
            --primary: #00d2ff;
            --secondary: #3a7bd5;
            --accent: #FFD700;
            --text-main: #ffffff;
            --text-muted: #a0a0a0;
            --success: #00e676;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: var(--bg-gradient);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* --- Loading Screen --- */
        #loading-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-gradient);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255,255,255,0.1);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        .loading-text {
            margin-top: 15px;
            font-size: 14px;
            color: var(--text-muted);
            letter-spacing: 1px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loaded #loading-screen {
            opacity: 0;
            visibility: hidden;
        }

        /* --- Main Container --- */
        .container {
            width: 100%;
            max-width: 400px;
            padding: 20px;
            display: none; /* JS দিয়ে শো করাবে */
            flex-direction: column;
            gap: 20px;
            animation: slideUp 0.6s ease forwards;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- Balance Card (Glassmorphism) --- */
        .balance-card {
            background: linear-gradient(45deg, rgba(0, 210, 255, 0.2), rgba(58, 123, 213, 0.2));
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            padding: 25px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            position: relative;
            overflow: hidden;
        }
        
        .balance-card::before {
            content: '';
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 60%);
            animation: shine 6s infinite linear;
        }

        @keyframes shine {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .balance-icon {
            font-size: 24px;
            margin-bottom: 10px;
            display: block;
        }

        .balance-label {
            font-size: 14px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .balance-amount {
            font-size: 42px;
            font-weight: 700;
            margin-top: 5px;
            background: linear-gradient(to right, #fff, #b3e5fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .balance-amount small {
            font-size: 16px;
            font-weight: 400;
            opacity: 0.8;
        }

        /* --- Task Card --- */
        .task-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 20px;
            text-align: left;
            transition: transform 0.2s;
        }

        .task-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
        }

        .task-icon-box {
            width: 50px;
            height: 50px;
            background: rgba(255, 215, 0, 0.15);
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            color: var(--accent);
        }

        .task-title {
            font-size: 18px;
            font-weight: 600;
        }

        .task-desc {
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 15px;
            line-height: 1.5;
        }

        /* --- Buttons --- */
        .btn {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: none;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
        }

        .btn-primary {
            background: linear-gradient(90deg, var(--secondary), var(--primary));
            color: white;
            box-shadow: 0 4px 15px rgba(0, 210, 255, 0.3);
        }

        .btn-primary:active {
            transform: scale(0.97);
            box-shadow: 0 2px 5px rgba(0, 210, 255, 0.3);
        }

        .btn-close {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-muted);
            border: 1px solid rgba(255, 255, 255, 0.1);
            margin-top: 10px;
        }
        
        .btn-close:active {
            background: rgba(255, 255, 255, 0.1);
        }

        /* --- Toast Notification --- */
        #toast {
            position: fixed;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--success);
            color: #000;
            padding: 12px 24px;
            border-radius: 50px;
            font-weight: bold;
            box-shadow: 0 5px 20px rgba(0, 230, 118, 0.4);
            opacity: 0;
            transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        #toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* Pulse Animation for Icon */
        .pulse {
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

    </style>
</head>
<body>

    <!-- Loading Screen -->
    <div id="loading-screen">
        <div class="spinner"></div>
        <div class="loading-text">Initializing...</div>
    </div>

    <!-- Main App Container -->
    <div class="container" id="app">
        
        <div class="header" style="text-align: center; margin-bottom: 10px;">
            <h2 style="font-weight: 300; letter-spacing: 1px;">🔥 TASK CENTER</h2>
        </div>

        <!-- Balance Section -->
        <div class="balance-card">
            <span class="balance-icon">💎</span>
            <div class="balance-label">Available Balance</div>
            <div class="balance-amount" id="balanceDisplay">0 <small>Coins</small></div>
        </div>

        <!-- Task Section -->
        <div class="task-card">
            <div class="task-header">
                <div class="task-icon-box">📺</div>
                <div>
                    <div class="task-title">Watch & Earn</div>
                </div>
            </div>
            <p class="task-desc">প্রিমিয়াম ভিডিও বিজ্ঞাপনটি সম্পূর্ণ দেখুন এবং তাৎক্ষণিক <strong>১০ কয়েন</strong> জিতে নিন।</p>
            
            <button class="btn btn-primary" id="watchBtn" onclick="watchAd()">
                <span>▶</span> Watch Ad (+10)
            </button>
        </div>

        <button class="btn btn-close" onclick="window.Telegram.WebApp.close()">✖ Close Window</button>
    </div>

    <!-- Toast -->
    <div id="toast">✅ Reward Claimed!</div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const urlParams = new URLSearchParams(window.location.search);
        const uid = urlParams.get('uid');
        let balanceInterval;

        // Fake Loading Simulation for UI
        setTimeout(() => {
            document.body.classList.add('loaded');
            document.getElementById('app').style.display = 'flex';
            
            // Initial Balance Fetch
            if(uid) {
                updateBalance(); // Fetch immediately
                balanceInterval = setInterval(updateBalance, 5000); // Poll every 5s
            } else {
                document.getElementById('balanceDisplay').innerHTML = 'Error <small>No UID</small>';
            }
        }, 1500); // 1.5 second loading delay

        // Function to Fetch Balance
        function updateBalance() {
            if(!uid) return;
            
            // Simulating API call (Replace with your actual fetch logic)
            fetch(`/api/balance?uid=${uid}`)
            .then(res => res.json())
            .then(data => {
                if(data.balance !== undefined) {
                    document.getElementById('balanceDisplay').innerHTML = `${data.balance} <small>Coins</small>`;
                }
            }).catch(e => console.log("Balance fetch error", e));
        }

        // Watch Ad Function
        function watchAd() {
            if(!uid) {
                alert("Error: Please open from the bot.");
                return;
            }

            const btn = document.getElementById('watchBtn');
            btn.innerHTML = '<span class="pulse">⏳</span> Loading Ad...';
            btn.disabled = true;
            btn.style.opacity = "0.7";

            // Ad Integration Logic
            try {
                if (typeof show_10525553 === 'function') {
                    show_10525553().then(() => {
                        giveReward();
                        resetBtn(btn);
                    }).catch(e => {
                        console.log("Ad SDK Error:", e);
                        giveReward(); // Fallback for testing
                        resetBtn(btn);
                    });
                } else {
                    // Simulate Ad Wait if SDK missing
                    setTimeout(() => {
                        giveReward();
                        resetBtn(btn);
                    }, 2500);
                }
            } catch (e) {
                console.error(e);
                setTimeout(() => {
                    giveReward();
                    resetBtn(btn);
                }, 2000);
            }
        }

        function resetBtn(btn) {
            btn.innerHTML = '<span>▶</span> Watch Ad (+10)';
            btn.disabled = false;
            btn.style.opacity = "1";
        }

        function giveReward() {
            fetch('/api/reward', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ uid: uid })
            })
            .then(res => res.json())
            .then(data => {
                if(data.success) {
                    // Update UI with new balance from response
                    document.getElementById('balanceDisplay').innerHTML = `${data.newBalance} <small>Coins</small>`;
                    
                    // Show Toast
                    const toast = document.getElementById("toast");
                    toast.className = "show";
                    setTimeout(() => { toast.className = toast.className.replace("show", ""); }, 3000);
                }
            });
        }
    </script>
</body>
</html>
